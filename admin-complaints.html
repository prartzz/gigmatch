<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Complaints - GigMatch</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body {
            background: #f5f5f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .navbar h1 {
            font-size: 24px;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .filters {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .filter-group label {
            font-weight: 600;
            font-size: 14px;
            color: #333;
        }

        select {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .stat-box .number {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }

        .stat-box .label {
            font-size: 14px;
            color: #666;
        }

        .complaints-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .complaint-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            border-left: 4px solid #667eea;
            cursor: pointer;
            transition: all 0.3s;
        }

        .complaint-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
        }

        .complaint-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .complaint-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-open {
            background: #ffd4d4;
            color: #d32f2f;
        }

        .status-under-review {
            background: #fff3cd;
            color: #F57F17;
        }

        .status-resolved {
            background: #c8e6c9;
            color: #2e7d32;
        }

        .status-closed {
            background: #e0e0e0;
            color: #666;
        }

        .complaint-details {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 10px 0;
            font-size: 13px;
            color: #666;
        }

        .detail-item {
            display: flex;
            flex-direction: column;
        }

        .detail-label {
            font-weight: 600;
            color: #333;
            margin-bottom: 3px;
        }

        .complaint-description {
            color: #666;
            font-size: 14px;
            line-height: 1.5;
            margin: 10px 0;
            padding: 10px;
            background: #f9f9f9;
            border-radius: 4px;
        }

        .complaint-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-view {
            background: #667eea;
            color: white;
        }

        .btn-view:hover {
            background: #5568d3;
        }

        .btn-resolve {
            background: #4caf50;
            color: white;
        }

        .btn-resolve:hover {
            background: #45a049;
        }

        .btn-close {
            background: #999;
            color: white;
        }

        .btn-close:hover {
            background: #888;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            overflow-y: auto;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            border-radius: 8px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .modal-header {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
        }

        .modal-body {
            margin-bottom: 20px;
            font-size: 14px;
            color: #666;
            line-height: 1.6;
        }

        .modal-footer {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        @media (max-width: 768px) {
            .complaint-details {
                grid-template-columns: 1fr;
            }

            .filters {
                flex-direction: column;
            }

            .complaint-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>🚨 Complaint Management</h1>
    </div>

    <div class="container">
        <!-- Filters -->
        <div class="filters">
            <div class="filter-group">
                <label>Status:</label>
                <select id="statusFilter" onchange="filterComplaints()">
                    <option value="">All</option>
                    <option value="open">Open</option>
                    <option value="under_review">Under Review</option>
                    <option value="resolved">Resolved</option>
                    <option value="closed">Closed</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Reason:</label>
                <select id="reasonFilter" onchange="filterComplaints()">
                    <option value="">All</option>
                    <option value="payment_not_released">Payment Not Released</option>
                    <option value="job_not_completed">Job Not Completed</option>
                    <option value="poor_quality">Poor Quality</option>
                    <option value="unprofessional_behavior">Unprofessional</option>
                    <option value="other">Other</option>
                </select>
            </div>
            <button class="btn btn-view" onclick="loadComplaints()">Refresh</button>
        </div>

        <!-- Statistics -->
        <div class="stats">
            <div class="stat-box">
                <div class="number" id="statTotal">0</div>
                <div class="label">Total Complaints</div>
            </div>
            <div class="stat-box">
                <div class="number" id="statOpen">0</div>
                <div class="label">Open</div>
            </div>
            <div class="stat-box">
                <div class="number" id="statReview">0</div>
                <div class="label">Under Review</div>
            </div>
            <div class="stat-box">
                <div class="number" id="statResolved">0</div>
                <div class="label">Resolved</div>
            </div>
        </div>

        <!-- Complaints List -->
        <div class="complaints-list" id="complaintsList">
            <div class="empty-state">
                <div class="icon">📋</div>
                <p>Loading complaints...</p>
            </div>
        </div>
    </div>

    <!-- Complaint Detail Modal -->
    <div class="modal" id="detailModal">
        <div class="modal-content">
            <div class="modal-header" id="modalTitle"></div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer">
                <button class="btn btn-resolve" onclick="openResolveModal()">Mark as Resolved</button>
                <button class="btn btn-close" onclick="closeDetailModal()">Close</button>
            </div>
        </div>
    </div>

    <!-- Resolve Modal -->
    <div class="modal" id="resolveModal">
        <div class="modal-content">
            <div class="modal-header">Resolve Complaint</div>
            <div class="modal-body">
                <label style="display: block; margin-bottom: 10px;">
                    <strong>Admin Resolution Notes:</strong>
                </label>
                <textarea id="resolutionNotes" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; min-height: 100px;"></textarea>
            </div>
            <div class="modal-footer">
                <button class="btn btn-close" onclick="closeResolveModal()">Cancel</button>
                <button class="btn btn-resolve" onclick="submitResolution()">Confirm Resolution</button>
            </div>
        </div>
    </div>

    <script src="js/firebase-config.js"></script>
    <script src="js/complaint.js"></script>

    <script>
        let currentComplaintId = null;

        document.addEventListener('DOMContentLoaded', async () => {
            await loadComplaints();
        });

        async function loadComplaints() {
            // Implementation in complaint.js
            initializeAdminDashboard();
        }

        function filterComplaints() {
            // Will be implemented in complaint.js
            loadComplaints();
        }

        function openDetailModal(complaintId) {
            currentComplaintId = complaintId;
            document.getElementById('detailModal').classList.add('active');
        }

        function closeDetailModal() {
            document.getElementById('detailModal').classList.remove('active');
            currentComplaintId = null;
        }

        function openResolveModal() {
            document.getElementById('detailModal').classList.remove('active');
            document.getElementById('resolveModal').classList.add('active');
        }

        function closeResolveModal() {
            document.getElementById('resolveModal').classList.remove('active');
            document.getElementById('resolutionNotes').value = '';
        }

        function submitResolution() {
            const notes = document.getElementById('resolutionNotes').value.trim();
            if (!notes) {
                alert('Please enter resolution notes');
                return;
            }
            // Will be implemented in complaint.js
            resolveComplaint(currentComplaintId, notes);
        }
    </script>
</body>
</html>
