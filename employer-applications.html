<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Applications | GigMatch Employer</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            background: var(--bg-secondary, #f9fafb);
            min-height: 100vh;
            padding: 20px;
            color: var(--text-dark, #1f2937);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .page-header {
            background: linear-gradient(135deg, var(--primary, #6366f1) 0%, var(--primary-dark, #4f46e5) 100%);
            color: white;
            padding: 40px 30px;
            border-radius: 16px;
            margin-bottom: 30px;
            animation: slideUp 0.4s ease-out;
            box-shadow: var(--shadow-lg, 0 10px 15px -3px rgba(0, 0, 0, 0.1));
        }

        .page-header h1 {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
        }

        .page-header p {
            opacity: 0.95;
            font-size: 15px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.9) !important;
        }

        .back-button {
            display: inline-block;
            margin-bottom: 20px;
            padding: 10px 20px;
            background: var(--bg-primary, #ffffff);
            color: var(--primary, #6366f1);
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .back-button:hover {
            background: var(--bg-secondary, #f9fafb);
            transform: translateX(-4px);
        }

        .filters {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 20px;
            border: 2px solid var(--border-light, #e5e7eb);
            background: var(--bg-primary, #ffffff);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            color: var(--text-dark, #1f2937);
            transition: all 0.3s ease;
        }

        .filter-btn:hover {
            border-color: var(--primary, #6366f1);
            color: var(--primary, #6366f1);
        }

        .filter-btn.active {
            background: var(--primary, #6366f1);
            color: white;
            border-color: var(--primary, #6366f1);
        }

        .applications-grid {
            display: grid;
            gap: 20px;
        }

        .job-section {
            background: var(--bg-primary, #ffffff);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--shadow-md, 0 4px 6px -1px rgba(0, 0, 0, 0.1));
            animation: slideUp 0.4s ease-out;
        }

        .job-section-header {
            padding: 20px;
            background: linear-gradient(135deg, var(--primary, #6366f1) 0%, var(--primary-dark, #4f46e5) 100%);
            color: white;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }

        .job-section-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .job-section-meta {
            display: flex;
            gap: 20px;
            font-size: 14px;
            opacity: 0.9;
        }

        .job-section-content {
            padding: 20px;
        }

        .application-card {
            background: var(--bg-secondary, #f9fafb);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 16px;
            border-left: 4px solid var(--primary, #6366f1);
            transition: all 0.3s ease;
        }

        .application-card:hover {
            box-shadow: var(--shadow-md, 0 4px 6px -1px rgba(0, 0, 0, 0.1));
            transform: translateX(4px);
        }

        .application-card.status-accepted {
            border-left-color: #10b981;
            background: rgba(16, 185, 129, 0.05);
        }

        .application-card.status-rejected {
            border-left-color: #ef4444;
            background: rgba(239, 68, 68, 0.05);
        }

        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
            gap: 16px;
        }

        .app-worker-info {
            flex: 1;
        }

        .app-worker-name {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-dark, #1f2937);
            margin-bottom: 4px;
        }

        .app-worker-email {
            font-size: 14px;
            color: var(--text-light, #6b7280);
        }

        .app-status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .status-pending {
            background: rgba(245, 158, 11, 0.1);
            color: #f59e0b;
        }

        .status-accepted {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
        }

        .status-rejected {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
        }

        .app-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-light, #e5e7eb);
        }

        .detail-item {
            display: flex;
            flex-direction: column;
        }

        .detail-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-light, #6b7280);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .detail-value {
            font-size: 14px;
            color: var(--text-dark, #1f2937);
            font-weight: 500;
        }

        .cover-letter {
            background: var(--bg-primary, #ffffff);
            padding: 16px;
            border-left: 4px solid var(--secondary, #ec4899);
            border-radius: 8px;
            margin-bottom: 16px;
        }

        .cover-letter-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-light, #6b7280);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .cover-letter-text {
            font-size: 14px;
            color: var(--text-dark, #1f2937);
            line-height: 1.6;
        }

        .app-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn-action {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            flex: 1;
            min-width: 120px;
        }

        .btn-accept {
            background: #10b981;
            color: white;
        }

        .btn-accept:hover:not(:disabled) {
            background: #059669;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        .btn-reject {
            background: #ef4444;
            color: white;
        }

        .btn-reject:hover:not(:disabled) {
            background: #dc2626;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
        }

        .btn-message {
            background: var(--primary, #6366f1);
            color: white;
        }

        .btn-message:hover:not(:disabled) {
            background: var(--primary-dark, #4f46e5);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .btn-action:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .empty-state {
            text-align: center;
            padding: 60px 30px;
            color: var(--text-light, #6b7280);
        }

        .empty-icon {
            margin-bottom: 16px;
            display: flex;
            justify-content: center;
        }
        .empty-icon svg {
            width: 48px;
            height: 48px;
            color: var(--text-light, #6b7280);
            stroke-width: 1.5;
        }

        .empty-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-dark, #1f2937);
            margin-bottom: 8px;
        }

        .empty-text {
            font-size: 15px;
            line-height: 1.6;
        }

        .loading {
            text-align: center;
            padding: 60px 30px;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--border-light, #e5e7eb);
            border-top-color: var(--primary, #6366f1);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: white;
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            animation: slideIn 0.3s ease-out;
            z-index: 1000;
            max-width: 400px;
        }

        .toast.success {
            border-left: 4px solid #10b981;
            color: #10b981;
        }

        .toast.error {
            border-left: 4px solid #ef4444;
            color: #ef4444;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .page-header {
                padding: 24px 20px;
            }

            .page-header h1 {
                font-size: 24px;
            }

            .filters {
                gap: 8px;
            }

            .filter-btn {
                padding: 8px 16px;
                font-size: 13px;
            }

            .app-details {
                grid-template-columns: 1fr;
            }

            .app-actions {
                flex-direction: column;
            }

            .btn-action {
                width: 100%;
            }
        }

        @media (max-width: 480px) {
            .page-header {
                padding: 20px 16px;
                margin-bottom: 20px;
            }

            .page-header h1 {
                font-size: 20px;
            }

            .job-section-content {
                padding: 16px;
            }

            .application-card {
                padding: 16px;
            }

            .app-header {
                flex-direction: column;
                gap: 12px;
            }

            .back-button {
                margin-bottom: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="dashboard.html" class="back-button">← Back to Dashboard</a>

        <div class="page-header">
            <h1 style="display: flex; align-items: center; gap: 12px; justify-content: center;">
                <svg width="32" height="32" fill="none" class="banner-icon" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg> 
                Manage Applications
            </h1>
            <p style="text-align: center;">Review and manage applications from workers for your job postings</p>
        </div>

        <div class="filters" id="filterContainer">
            <button class="filter-btn active" onclick="filterApplications('all')">All Applications</button>
            <button class="filter-btn" onclick="filterApplications('pending')">⏳ Pending</button>
            <button class="filter-btn" onclick="filterApplications('accepted')">✅ Accepted</button>
            <button class="filter-btn" onclick="filterApplications('rejected')">❌ Rejected</button>
        </div>

        <div id="loadingContainer" class="loading" style="display: none;">
            <div class="loading-spinner"></div>
            <p>Loading applications...</p>
        </div>

        <div id="applicationsContainer" class="applications-grid" style="display: none;">
            <!-- Job sections will be populated here -->
        </div>

        <div id="emptyState" class="empty-state" style="display: none;">
            <div class="empty-icon">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" d="M3 19v-8.93a2 2 0 01.89-1.664l7-4.666a2 2 0 012.22 0l7 4.666A2 2 0 0121 10.07V19M3 19a2 2 0 002 2h14a2 2 0 002-2M3 19l6.75-4.5M21 19l-6.75-4.5M3 10l6.75 4.5M21 10l-6.75 4.5m0 0l-1.14.76a2 2 0 01-2.22 0l-1.14-.76"></path></svg>
            </div>
            <h3 class="empty-title">No Applications Yet</h3>
            <p class="empty-text">
                Post more jobs to receive applications from workers.
            </p>
        </div>
    </div>

    <script type="module" src="js/employer-applications.js"></script>
</body>
</html>
