<!DOCTYPE html>
<html>
<head>
    <title>🔍 GigMatch Debug Console</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: #1e1e1e;
            color: #00ff00;
            padding: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }
        h1 { color: #00ffff; }
        .section { background: #2d2d2d; padding: 15px; margin: 15px 0; border-radius: 5px; border-left: 3px solid #00ff00; }
        .log { background: #1a1a1a; padding: 20px; border-radius: 5px; height: 400px; overflow: auto; font-size: 12px; }
        .log div { margin: 5px 0; }
        .success { color: #00ff00; }
        .error { color: #ff0000; }
        .info { color: #00ffff; }
        .warn { color: #ffff00; }
        button { background: #00ff00; color: #000; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; margin: 5px; }
        button:hover { background: #00cc00; }
    </style>
</head>
<body>
    <h1>🔍 GigMatch Debug - Firebase & Jobs Status</h1>
    
    <div class="section">
        <h3>Firebase Status</h3>
        <div id="firebaseStatus">Checking...</div>
    </div>
    
    <div class="section">
        <h3>Jobs in Firestore</h3>
        <button onclick="checkJobsCount()">Check Jobs Count</button>
        <button onclick="listAllJobs()">List All Jobs</button>
        <button onclick="createTestJobs()">Create 5 Test Jobs</button>
    </div>

    <div class="section">
        <h3>Console Logs</h3>
        <div class="log" id="consoleLogs"></div>
    </div>

    <script type="module">
        import { db, auth, waitForFirebase } from './js/firebase-config.js';
        import { collection, getDocs, addDoc, Timestamp } from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js';

        const logDiv = document.getElementById('consoleLogs');
        const firebaseStatusDiv = document.getElementById('firebaseStatus');

        function log(msg, type = 'info') {
            const div = document.createElement('div');
            div.innerHTML = msg;
            div.className = type;
            logDiv.appendChild(div);
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(msg);
        }

        // Check Firebase status
        async function checkFirebaseStatus() {
            log('🔍 Checking Firebase status...', 'info');
            try {
                await waitForFirebase();
                firebaseStatusDiv.innerHTML = '<span class="success">✅ Firebase Connected</span>';
                log('✅ Firebase initialized successfully', 'success');
                return true;
            } catch (error) {
                firebaseStatusDiv.innerHTML = '<span class="error">❌ Firebase Failed: ' + error.message + '</span>';
                log('❌ Firebase error: ' + error.message, 'error');
                return false;
            }
        }

        // Check jobs count
        window.checkJobsCount = async function() {
            log('📊 Counting jobs in Firestore...', 'info');
            try {
                const snapshot = await getDocs(collection(db, 'jobs'));
                const count = snapshot.size;
                log(`<span class="success">✅ Found ${count} jobs in Firestore</span>`, 'success');
                return count;
            } catch (error) {
                log(`<span class="error">❌ Error counting jobs: ${error.message}</span>`, 'error');
                return 0;
            }
        };

        // List all jobs
        window.listAllJobs = async function() {
            log('📋 Fetching all jobs...', 'info');
            try {
                const snapshot = await getDocs(collection(db, 'jobs'));
                if (snapshot.empty) {
                    log('<span class="warn">⚠️ No jobs found in Firestore</span>', 'warn');
                    return;
                }
                log(`<span class="success">✅ Found ${snapshot.size} jobs:</span>`, 'success');
                snapshot.forEach((doc) => {
                    const job = doc.data();
                    log(`  • <span class="info">${job.title}</span> - ₹${job.hourlyRate}/hr (${job.location})`, 'info');
                });
            } catch (error) {
                log(`<span class="error">❌ Error fetching jobs: ${error.message}</span>`, 'error');
            }
        };

        // Create test jobs
        window.createTestJobs = async function() {
            const testJobs = [
                {
                    title: "Website Design & Development",
                    description: "Professional web development",
                    category: "IT",
                    hourlyRate: 500,
                    location: "Bangalore",
                    duration: "one-week",
                    requiredSkills: ["HTML", "CSS", "React"],
                    status: "active",
                    employerName: "Tech Startup",
                    employerId: "test-1",
                    applicationsCount: 0,
                    views: 0
                },
                {
                    title: "Mobile App Development",
                    description: "React Native mobile app",
                    category: "IT",
                    hourlyRate: 750,
                    location: "Mumbai",
                    duration: "few-days",
                    requiredSkills: ["React Native", "JavaScript"],
                    status: "active",
                    employerName: "Mobile Inc",
                    employerId: "test-2",
                    applicationsCount: 0,
                    views: 0
                },
                {
                    title: "Office Cleaning",
                    description: "Daily office cleaning",
                    category: "Cleaning",
                    hourlyRate: 150,
                    location: "Pune",
                    duration: "ongoing",
                    requiredSkills: ["Cleaning"],
                    status: "active",
                    employerName: "Facilities Co",
                    employerId: "test-3",
                    applicationsCount: 0,
                    views: 0
                },
                {
                    title: "Home Painting",
                    description: "Interior house painting",
                    category: "Construction",
                    hourlyRate: 300,
                    location: "Delhi",
                    duration: "one-week",
                    requiredSkills: ["Painting"],
                    status: "active",
                    employerName: "Renovation Co",
                    employerId: "test-4",
                    applicationsCount: 0,
                    views: 0
                },
                {
                    title: "Tech Blog Writing",
                    description: "Technical content writing",
                    category: "Writing",
                    hourlyRate: 400,
                    location: "Remote",
                    duration: "ongoing",
                    requiredSkills: ["Writing", "SEO"],
                    status: "active",
                    employerName: "Tech Media",
                    employerId: "test-5",
                    applicationsCount: 0,
                    views: 0
                }
            ];

            log('🌱 Starting to create test jobs...', 'info');
            let created = 0;
            try {
                for (const job of testJobs) {
                    const jobWithTimestamp = {
                        ...job,
                        createdAt: Timestamp.now(),
                        updatedAt: Timestamp.now()
                    };
                    const docRef = await addDoc(collection(db, 'jobs'), jobWithTimestamp);
                    log(`  ✅ Created: "${job.title}"`, 'success');
                    created++;
                    await new Promise(resolve => setTimeout(resolve, 500));
                }
                log(`<span class="success">✨ Successfully created ${created} test jobs!</span>`, 'success');
            } catch (error) {
                log(`<span class="error">❌ Error creating jobs: ${error.message}</span>`, 'error');
            }
        };

        // Initialize
        window.addEventListener('load', checkFirebaseStatus);
    </script>
</body>
</html>
