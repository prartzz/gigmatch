<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GigMatch - Debug Console</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body {
            font-family: monospace;
            background: #1e1e1e;
            color: #00ff00;
            padding: 20px;
        }
        .debug-container {
            max-width: 800px;
            margin: 0 auto;
            background: #2d2d2d;
            padding: 20px;
            border-radius: 8px;
            border: 2px solid #00ff00;
        }
        .log-entry {
            padding: 5px 0;
            border-bottom: 1px solid #444;
            font-size: 12px;
        }
        .log-entry.error {
            color: #ff0000;
        }
        .log-entry.success {
            color: #00ff00;
        }
        .log-entry.warning {
            color: #ffff00;
        }
        .log-entry.info {
            color: #00ccff;
        }
        button {
            background: #00ff00;
            color: #000;
            border: none;
            padding: 10px 20px;
            margin: 10px 5px 10px 0;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background: #00dd00;
        }
        .button-group {
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="debug-container">
        <h1>🔧 GigMatch Debug Console</h1>
        
        <div class="button-group">
            <button onclick="testFirebase()">Test Firebase Init</button>
            <button onclick="checkAuthState()">Check Auth State</button>
            <button onclick="testLogin()">Test Login (test@example.com)</button>
            <button onclick="testLogout()">Test Logout</button>
            <button onclick="listUsers()">List Firestore Users</button>
            <button onclick="clearLogs()">Clear Logs</button>
        </div>

        <h2>Console Output:</h2>
        <div id="debugLog"></div>
    </div>

    <script type="module">
        import { auth, db, waitForFirebase } from './js/firebase-config.js';
        import { signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
        import { collection, getDocs } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        window.debugLog = [];

        function log(message, level = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const entry = `[${timestamp}] [${level.toUpperCase()}] ${message}`;
            window.debugLog.push(entry);
            
            const logDiv = document.getElementById('debugLog');
            const entryEl = document.createElement('div');
            entryEl.className = `log-entry ${level}`;
            entryEl.textContent = entry;
            logDiv.appendChild(entryEl);
            logDiv.scrollTop = logDiv.scrollHeight;
            
            console.log(entry);
        }

        window.clearLogs = () => {
            window.debugLog = [];
            document.getElementById('debugLog').innerHTML = '';
            log('Logs cleared', 'success');
        }

        window.testFirebase = async () => {
            log('Testing Firebase initialization...', 'info');
            try {
                await waitForFirebase();
                log('✓ Firebase initialized successfully', 'success');
                log('Auth object: ' + (auth ? 'OK' : 'MISSING'), 'info');
                log('DB object: ' + (db ? 'OK' : 'MISSING'), 'info');
            } catch (err) {
                log('✗ Firebase initialization failed: ' + err.message, 'error');
            }
        }

        window.checkAuthState = async () => {
            log('Checking authentication state...', 'info');
            
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    log('✓ User is authenticated: ' + user.email, 'success');
                    log('  UID: ' + user.uid, 'info');
                } else {
                    log('✗ No user is currently logged in', 'warning');
                }
            });
        }

        window.testLogin = async () => {
            log('Attempting login with test@example.com / Test@1234...', 'info');
            try {
                const result = await signInWithEmailAndPassword(auth, 'test@example.com', 'Test@1234');
                log('✓ Login successful!', 'success');
                log('  Email: ' + result.user.email, 'info');
                log('  UID: ' + result.user.uid, 'info');
            } catch (err) {
                log('✗ Login failed: ' + err.message, 'error');
                log('  Code: ' + err.code, 'error');
            }
        }

        window.testLogout = async () => {
            log('Attempting logout...', 'info');
            try {
                await signOut(auth);
                log('✓ Logout successful!', 'success');
            } catch (err) {
                log('✗ Logout failed: ' + err.message, 'error');
            }
        }

        window.listUsers = async () => {
            log('Fetching users from Firestore...', 'info');
            try {
                const usersRef = collection(db, 'users');
                const snapshot = await getDocs(usersRef);
                
                if (snapshot.empty) {
                    log('⚠ No users found in Firestore', 'warning');
                    return;
                }

                log(`✓ Found ${snapshot.size} user(s)`, 'success');
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    log(`  - Email: ${data.email} | Type: ${data.userType} | UID: ${doc.id}`, 'info');
                });
            } catch (err) {
                log('✗ Error fetching users: ' + err.message, 'error');
            }
        }

        // Initialize
        log('Debug console initialized', 'success');
        log('Click buttons above to test Firebase functionality', 'info');
        
        // Test Firebase on load
        setTimeout(() => {
            log('Running auto-test...', 'info');
            window.testFirebase();
        }, 1000);
    </script>
</body>
</html>
