        window.seedDemoData = async function() {
            outputLog = [];
            document.getElementById('seedBtn').disabled = true;
            document.getElementById('clearBtn').disabled = true;

            try {
                await waitForFirebase();
                log('✓ Firebase initialized', 'success');

                // Create test employer accounts
                const createdEmployers = [];
                log('\n📝 Creating employer accounts...', 'warning');

                for (const employer of testEmployers) {
                    try {
                        const userCredential = await createUserWithEmailAndPassword(auth, employer.email, employer.password);
                        const userId = userCredential.user.uid;
                        
                        // Create user profile
                        await addDoc(collection(db, 'users'), {
                            uid: userId,
                            email: employer.email,
                            fullName: employer.name,
                            userType: 'employer',
                            role: 'user',
                            createdAt: Timestamp.now()
                        });

                        createdEmployers.push({ id: userId, name: employer.name });
                        log(`✓ Created employer: ${employer.name}`, 'success');
                    } catch (error) {
                        if (error.code === 'auth/email-already-in-use') {
                            log(`⚠ Employer already exists: ${employer.name}`, 'warning');
                        } else {
                            log(`✗ Error creating employer: ${error.message}`, 'error');
                        }
                    }
                }

                log(`\n🏢 Found/Created ${createdEmployers.length} employers`, 'success');

                // Get all employers from database for job assignment
                log('\n🔍 Retrieving all employers from database...', 'warning');
                const usersSnapshot = await getDocs(collection(db, 'users'));
                const employers = [];
                usersSnapshot.forEach(doc => {
                    const user = doc.data();
                    if (user.userType === 'employer') {
                        employers.push({ id: doc.id, name: user.fullName });
                    }
                });
                log(`✓ Found ${employers.length} employers in database`, 'success');

                // Create jobs
                log(`\n📋 Creating ${jobTemplates.length} demo jobs...`, 'warning');
                let jobsCreated = 0;

                for (const jobTemplate of jobTemplates) {
                    try {
                        const employerIndex = jobTemplate.employerIndex % employers.length;
                        const employer = employers[employerIndex];

                        const jobData = {
                            title: jobTemplate.title,
                            description: jobTemplate.description,
                            category: jobTemplate.category,
                            hourlyRate: jobTemplate.hourlyRate,
                            location: jobTemplate.location,
                            duration: jobTemplate.duration,
                            requiredSkills: jobTemplate.requiredSkills,
                            status: 'active',
                            employer: employer.id,
                            employerName: employer.name,
                            applicationsCount: 0,
                            views: 0,
                            createdAt: Timestamp.now(),
                            updatedAt: Timestamp.now()
                        };

                        const docRef = await addDoc(collection(db, 'jobs'), jobData);
                        jobsCreated++;
                        
                        if (jobsCreated % 5 === 0) {
                            log(`✓ Created ${jobsCreated}/${jobTemplates.length} jobs...`, 'success');
                        }
                    } catch (error) {
                        log(`✗ Error creating job "${jobTemplate.title}": ${error.message}`, 'error');
                    }
                }

                log(`\n✨ Successfully created ${jobsCreated} jobs!`, 'success');
                log('\n🎉 Demo data seeding complete!', 'success');
                log('\nYou can now:', 'warning');
                log('1. Go to jobs-discover.html to see all jobs', 'info');
                log('2. Try the filters (category, location, hourly rate, duration)', 'info');
                log('3. View job details and apply for jobs', 'info');
                log('\nTest Employer Accounts:', 'warning');
                testEmployers.forEach((emp, idx) => {
                    log(`${idx + 1}. ${emp.name} / ${emp.email}`, 'info');
                });

            } catch (error) {
                log(`\n✗ Fatal error: ${error.message}`, 'error');
            } finally {
                document.getElementById('seedBtn').disabled = false;
                document.getElementById('clearBtn').disabled = false;
            }
        };

        window.clearAllJobs = async function() {
            if (!confirm('⚠️ Are you sure? This will delete ALL jobs but keep users and profiles.')) {
                return;
            }

            outputLog = [];
            document.getElementById('seedBtn').disabled = true;
            document.getElementById('clearBtn').disabled = true;

            try {
                await waitForFirebase();
                log('Clearing all jobs...', 'warning');

                const querySnapshot = await getDocs(collection(db, 'jobs'));
                let deleted = 0;

                for (const doc of querySnapshot.docs) {
                    await deleteDoc(doc.ref);
                    deleted++;
                    if (deleted % 5 === 0) {
                        log(`✓ Deleted ${deleted} jobs...`, 'success');
                    }
                }

                log(`✨ Successfully deleted ${deleted} jobs!`, 'success');

            } catch (error) {
                log(`✗ Error: ${error.message}`, 'error');
            } finally {
                document.getElementById('seedBtn').disabled = false;
                document.getElementById('clearBtn').disabled = false;
            }
        };
