<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GigMatch - Login</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/auth-redesign.css">
</head>
<body class="split-layout">
    <div class="split-image-side">
        <div class="image-overlay">
            <div class="brand-showcase">
                <div class="logo-large">💼</div>
                <h2>GigMatch</h2>
                <p>Welcome to the ultimate platform bridging skilled professionals with top opportunities in the Gig Economy.</p>
            </div>
        </div>
    </div>
    <div class="split-form-side">
        <div class="glass-container">
            <div class="form-header">
                <h1>Welcome Back</h1>
                <p>Sign in to continue your journey</p>
            </div>

            <form id="loginForm">
                <div class="form-group custom-input-group">
                    <label for="email">Email Address</label>
                    <input 
                        type="email" 
                        id="email" 
                        placeholder="your@email.com" 
                        required
                    >
                </div>

                <div class="form-group custom-input-group">
                    <label for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        placeholder="Enter your password" 
                        required
                    >
                </div>

                <button type="submit" class="btn btn-primary btn-large btn-glow">Sign In</button>
            </form>

            <div class="login-link">
                Don't have an account? <a href="mobile-register.html">Create one</a>
            </div>
        </div>
    </div>
    <script type="module" src="js/auth.js"></script>
</body>
</html>
