<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GigMatch - My Posted Jobs</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .jobs-list-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .page-header h1 {
            font-size: 32px;
            margin: 0;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .post-job-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .post-job-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.3);
        }

        .tabs {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
            border-bottom: 2px solid #e2e8f0;
        }

        .tab {
            padding: 12px 0;
            border: none;
            background: none;
            font-size: 16px;
            font-weight: 600;
            color: var(--text-light);
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
        }

        .tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .tab:hover {
            color: var(--text-dark);
        }

        .jobs-grid {
            display: grid;
            gap: 16px;
        }

        .job-item {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            transition: all 0.3s ease;
            border-left: 4px solid transparent;
        }

        .job-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
            border-left-color: var(--primary);
        }

        .job-item-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 12px;
        }

        .job-item-title {
            flex: 1;
        }

        .job-item-title h3 {
            font-size: 18px;
            margin: 0 0 4px 0;
            color: var(--text-dark);
        }

        .job-item-meta {
            display: flex;
            gap: 16px;
            font-size: 13px;
            color: var(--text-light);
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .job-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-active {
            background: #c6f6d5;
            color: #22543d;
        }

        .status-inactive {
            background: #fed7d7;
            color: #742a2a;
        }

        .status-filled {
            background: #bee3f8;
            color: #2c5282;
        }

        .job-item-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin: 16px 0;
            padding: 16px 0;
            border-top: 1px solid #e2e8f0;
            border-bottom: 1px solid #e2e8f0;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary);
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-light);
            margin-top: 4px;
        }

        .job-item-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            flex-wrap: wrap;
        }

        .action-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .action-btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
        }

        .action-btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .action-btn-secondary {
            background: white;
            color: var(--primary);
            border: 2px solid var(--primary);
        }

        .action-btn-secondary:hover {
            background: rgba(102, 126, 234, 0.05);
        }

        .action-btn-danger {
            background: white;
            color: #e53e3e;
            border: 2px solid #e53e3e;
        }

        .action-btn-danger:hover {
            background: rgba(229, 62, 62, 0.05);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }

        .empty-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-dark);
        }

        .empty-description {
            font-size: 14px;
            margin-bottom: 24px;
        }

        .cta-btn {
            padding: 12px 32px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .cta-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.3);
        }

        @media (max-width: 768px) {
            .page-header {
                flex-direction: column;
                gap: 16px;
                align-items: flex-start;
            }

            .page-header h1 {
                font-size: 24px;
            }

            .job-item {
                padding: 16px;
            }

            .job-item-header {
                flex-direction: column;
                gap: 12px;
            }

            .job-item-stats {
                grid-template-columns: 1fr;
            }

            .job-item-actions {
                flex-direction: column;
            }

            .action-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body style="background: #f7fafc;">
    <nav style="display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; background: white; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);">
        <h1 style="margin: 0; font-size: 20px;">💼 GigMatch</h1>
        <a href="dashboard.html" style="color: var(--primary); text-decoration: none; font-weight: 600;">← Back to Dashboard</a>
    </nav>

    <div class="jobs-list-container">
        <div class="page-header">
            <h1>My Posted Jobs</h1>
            <a href="job-post.html" class="post-job-btn">+ Post New Job</a>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="filterByStatus('all')">All Jobs</button>
            <button class="tab" onclick="filterByStatus('active')">Active</button>
            <button class="tab" onclick="filterByStatus('inactive')">Inactive</button>
            <button class="tab" onclick="filterByStatus('filled')">Filled</button>
        </div>

        <div id="loadingContainer" style="display: none; text-align: center; padding: 40px;">
            <p>Loading your jobs...</p>
        </div>

        <div id="jobsContainer" class="jobs-grid"></div>

        <div id="emptyState" style="display: none;">
            <div class="empty-state">
                <div class="empty-icon">📋</div>
                <div class="empty-title">No jobs posted yet</div>
                <div class="empty-description">Start by posting your first job to find great workers</div>
                <a href="job-post.html" class="cta-btn">+ Post Your First Job</a>
            </div>
        </div>
    </div>

    <script type="module" src="js/jobs-list.js"></script>
</body>
</html>
