<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Portal - GigMatch</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body {
            background: var(--bg-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: 'Inter', sans-serif;
            margin: 0;
        }

        .container {
            background: white;
            border-radius: 24px;
            box-shadow: var(--shadow-xl);
            max-width: 600px;
            width: 100%;
            padding: 40px;
            border: 1px solid var(--border-light);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: var(--text-dark);
            font-size: 32px;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        .header p {
            color: var(--text-light);
            font-size: 15px;
        }

        .job-receipt {
            background: var(--bg-secondary);
            padding: 24px;
            border-radius: 16px;
            margin-bottom: 30px;
            border-left: 4px solid var(--primary);
        }

        .job-receipt h3 {
            color: var(--text-dark);
            font-size: 15px;
            margin: 0 0 16px 0;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 700;
        }

        .receipt-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-light);
        }

        .receipt-row:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
            margin-top: 16px;
            font-weight: 700;
            font-size: 18px;
        }

        .receipt-label {
            color: var(--text-light);
            font-size: 14px;
        }

        .receipt-value {
            color: var(--text-dark);
            font-size: 15px;
            font-weight: 600;
        }

        .payment-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 30px;
        }

        .payment-card {
            border: 2px solid var(--border-light);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: white;
        }

        .payment-card:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .payment-card.selected {
            border-color: var(--primary);
            background: var(--bg-secondary);
        }

        .payment-icon {
            font-size: 32px;
            margin-bottom: 12px;
        }

        .payment-title {
            color: var(--text-dark);
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 8px;
        }

        .payment-desc {
            color: var(--text-light);
            font-size: 12px;
        }

        .btn {
            width: 100%;
            padding: 16px 24px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(92, 64, 51, 0.2);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(92, 64, 51, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .message {
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
            font-size: 15px;
            font-weight: 500;
        }

        .error {
            background: #FEE;
            color: #C33;
            border: 1px solid #FCC;
        }

        .success {
            background: var(--bg-secondary);
            color: var(--primary-dark);
            border: 1px solid var(--border-light);
        }

        @media (max-width: 600px) {
            .container {
                padding: 24px;
            }
            .payment-options {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💸 Release Payment</h1>
            <p>Select your payment method to complete the job lifecycle</p>
        </div>

        <div class="message" id="errorMsg"></div>
        <div class="message" id="successMsg"></div>

        <div class="job-receipt">
            <h3>Transaction Invoice</h3>
            <div class="receipt-row">
                <span class="receipt-label">Worker:</span>
                <span class="receipt-value" id="workerName">Loading...</span>
            </div>
            <div class="receipt-row">
                <span class="receipt-label">Job Title:</span>
                <span class="receipt-value" id="jobTitle">Loading...</span>
            </div>
            <div class="receipt-row">
                <span class="receipt-label">Hourly Rate:</span>
                <span class="receipt-value" id="hourlyRate">Loading...</span>
            </div>
            <div class="receipt-row">
                <span class="receipt-label">Total Payment Due:</span>
                <span class="receipt-value" id="totalDue" style="color: var(--primary); font-size: 20px;">----</span>
            </div>
        </div>

        <div class="payment-options">
            <div class="payment-card selected" data-method="cash" onclick="selectMethod('cash')">
                <div class="payment-icon">💵</div>
                <div class="payment-title">Cash Direct</div>
                <div class="payment-desc">Pay the worker directly in person.</div>
            </div>
            <div class="payment-card" data-method="online" onclick="selectMethod('online')">
                <div class="payment-icon">💳</div>
                <div class="payment-title">Online Transfer</div>
                <div class="payment-desc">Release simulated Escrow digitally.</div>
            </div>
        </div>

        <button class="btn btn-primary" id="confirmBtn" onclick="processPayment()">Confirm & Complete Job</button>
    </div>

    <script type="module" src="js/payment.js"></script>
    <script>
        let selectedMethod = 'cash';
        function selectMethod(method) {
            selectedMethod = method;
            document.querySelectorAll('.payment-card').forEach(card => card.classList.remove('selected'));
            document.querySelector(`.payment-card[data-method="${method}"]`).classList.add('selected');
        }
    </script>
</body>
</html>
